<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<meta name="color-scheme" content="dark">
<title>Chappie</title>
<link rel="manifest" href="/assets/manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32.png">
<link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600&display=swap');

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; overscroll-behavior: none; }
  body {
    position: fixed; inset: 0; user-select: none; -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent; touch-action: none;
    font-family: 'Chakra Petch', 'Segoe UI', sans-serif; color: #6d8296;
  }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }

  #bg {
    position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at 50% 45%, color-mix(in srgb, var(--emotion-color, #2fd9cc) 6%, transparent) 0%, transparent 55%);
  }

  #faceWrap { position: absolute; inset: 0; transition: transform .12s linear; }

  /* pico emocional forte (intensity alta) = flicker cyberpunk rapido, nao
     um efeito continuo — so uma piscada na borda de subida */
  @keyframes glitchFlash {
    0%, 100% { filter: none; transform: translateX(0); }
    20% { filter: hue-rotate(15deg) brightness(1.35); transform: translateX(-2px); }
    40% { filter: hue-rotate(-12deg) brightness(1.1); transform: translateX(2px); }
    60% { filter: none; transform: translateX(-1px); }
    80% { filter: brightness(1.2); transform: translateX(1px); }
  }
  #faceWrap.spike { animation: glitchFlash .22s steps(2, end); }
  #browEyeRow { position: absolute; left: 0; right: 0; top: 48%; transform: translateY(-50%); transition: top .4s ease; }
  #browEyeRow.speaking { top: 44%; }
  #browsRow { display: flex; justify-content: center; }
  .brow { border-radius: 2vw; opacity: .95; transition: transform .22s cubic-bezier(.34,1.3,.64,1), width .3s, height .3s; }
  #eyesRow { display: flex; justify-content: center; gap: 13vw; }
  .eye { border-radius: 3.5vw; transition: height .16s cubic-bezier(.34,1.56,.64,1); }

  /* "pensando": olhos oscilam sutil enquanto espera o Claude responder
     (HANDOFF §8, mitigacao de latencia percebida) */
  @keyframes eyeThinking { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(.72); } }
  #eyesRow.thinking .eye { animation: eyeThinking .6s ease-in-out infinite; }

  #mouthWrap { position: absolute; top: 67%; left: 50%; transform: translateX(-50%); transition: width .35s ease; }
  #mouthSvg { width: 100%; display: block; overflow: visible; }
  #mouthPath { stroke-linecap: round; stroke-linejoin: round; }

  #emotionLabel {
    position: absolute; top: 3.5vh; right: 3vw; font-size: 11px; letter-spacing: 3px;
    text-transform: uppercase; background: none; border: none; font-family: inherit;
    cursor: pointer; opacity: .7; padding: 6px;
  }
  #busyDots { position: absolute; top: 3.5vh; left: 3vw; font-size: 11px; letter-spacing: 4px; opacity: .5; display: none; }

  #neuroPanel {
    position: absolute; top: 9vh; right: 3vw; width: 220px; background: #05080dee;
    border: 1px solid #1e2c3a; border-radius: 12px; padding: 12px 14px; font-size: 10px;
    z-index: 5; display: none;
  }
  .neuro-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .neuro-label { width: 70px; }
  .neuro-bar-bg { flex: 1; height: 5px; background: #131d29; border-radius: 3px; }
  .neuro-bar-fill { height: 100%; border-radius: 3px; opacity: .85; }
  .neuro-val { width: 28px; text-align: right; opacity: .7; }
  .neuro-title { letter-spacing: 2px; margin: 10px 0 8px; color: #5f7d99; }

  #bottomBar { position: absolute; bottom: 4vh; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  #micBtn {
    width: 58px; height: 58px; border-radius: 50%; cursor: pointer;
    background: #0a0f16; border: 2px solid #26364a; display: flex;
    align-items: center; justify-content: center; transition: background .3s, border-color .3s;
  }
  #micBtn.on { background: var(--emotion-color, #2fd9cc); border-color: var(--emotion-color, #2fd9cc); }
  #micBtn svg { stroke: #5f7d99; }
  #micBtn.on svg { stroke: #000; }

  /* "ouvindo" de verdade agora (reconhecimento ativo, nao so mic ligado) */
  @keyframes micPulse {
    0%, 100% { box-shadow: 0 0 14px var(--emotion-color, #2fd9cc); }
    50% { box-shadow: 0 0 30px var(--emotion-color, #2fd9cc); }
  }
  #micBtn.on.listening { animation: micPulse 1s ease-in-out infinite; }

  #fallbackInput {
    display: none; background: #070b10; border: 1px solid #1e2c3a; border-radius: 8px;
    color: #c6d8e8; padding: 8px 10px; font-size: 13px; font-family: inherit; outline: none; width: 230px;
  }

  #errorBanner {
    position: absolute; bottom: 12vh; left: 0; right: 0; text-align: center;
    font-size: 12px; color: #ff4b2e; display: none; padding: 0 6vw;
  }

  /* Medidor de emocoes visual-first (pedido do Jack 16/07): barras tipo
     equalizador do Winamp, sempre visiveis, coladas na lateral esquerda.
     Toque/clique revela os nomes (writing-mode vertical, cabe no espaco
     estreito sem precisar de scroll horizontal). Ancorado no canto
     superior (nao mais centralizado verticalmente) — em telas estreitas de
     celular os olhos ocupam quase toda a largura e o brilho deles vaza bem
     alem da propria caixa, entao um medidor "no meio" acaba na frente do
     olho (bug real reportado 16/07, reproduzido em viewport 412x846). O
     topo da tela fica livre do rosto (browEyeRow comeca la pelos ~36vh).*/
  #emoMeter {
    position: absolute; left: 2.5vw; top: 8vh;
    display: flex; align-items: flex-end; gap: 5px; height: 16vh; min-height: 90px;
    cursor: pointer; z-index: 5; padding: 6px; touch-action: manipulation;
  }
  .emo-bar-wrap { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; }
  .emo-bar {
    width: 6px; min-height: 4px; border-radius: 3px; background: #1c2733;
    transition: height .18s ease, background .3s ease, box-shadow .3s ease;
  }
  .emo-bar-label {
    writing-mode: vertical-rl; text-orientation: mixed; font-size: 8px; letter-spacing: 1px;
    margin-top: 6px; opacity: 0; transition: opacity .2s ease; white-space: nowrap; max-height: 90px;
  }
  #emoMeter.open .emo-bar-label { opacity: .75; }
</style>

<div id="bg"></div>

<div id="emoMeter" aria-label="Medidor de emoções — toque pra ver os nomes"></div>

<div id="faceWrap">
  <div id="browEyeRow">
    <div id="browsRow">
      <div id="browR" class="brow"></div>
      <div id="browL" class="brow"></div>
    </div>
    <div id="eyesRow">
      <div id="eyeL" class="eye"></div>
      <div id="eyeR" class="eye"></div>
    </div>
  </div>
  <div id="mouthWrap">
    <svg id="mouthSvg" viewBox="0 0 200 60"><path id="mouthPath"/></svg>
  </div>
</div>

<button id="emotionLabel" aria-label="Abrir neuroquímica"></button>
<div id="busyDots">···</div>
<div id="neuroPanel" data-open="0"></div>

<div id="bottomBar">
  <button id="micBtn" aria-label="Microfone">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="9" y="2" width="6" height="12" rx="3"/>
      <path d="M5 10v1a7 7 0 0 0 14 0v-1"/>
      <line x1="12" y1="19" x2="12" y2="22"/>
    </svg>
  </button>
  <input id="fallbackInput" placeholder="Mic indisponível aqui — digita…">
</div>

<div id="errorBanner"></div>

<script type="module" src="/assets/app.js"></script>
